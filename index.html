<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyBuddy 3000</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <header class="hero-banner">
        <div class="hero-content">
            <p class="brand">StudyBuddy 3000</p>
            <h1 id="activityTitle">Loading...</h1>
            <p class="tagline">Learning • Practice • Grow</p>
            <p id="activityInfo"></p>
        </div>
    </header>

    <section id="studentEntry" class="card">
        <h2>Start Activity</h2>

        <label for="studentName">Student name</label>
        <input id="studentName" type="text" placeholder="Enter your name">

        <label for="studentClass">Class</label>
        <input id="studentClass" type="text" placeholder="Enter your class">

        <button id="startButton">Start Activity</button>

        <p id="entryError" class="error-message"></p>
    </section>

    <div class="progress-section">

    <div class="progress-header">
        <span id="questionProgress"></span>
        <span id="progressPercent"></span>
    </div>

    <div class="progress-bar">
        <div id="progressFill"></div>
    </div>

</div>
        <p id="questionProgress"></p>
        <h2 id="questionText"></h2>
        <div id="answerArea"></div>
    </section>

    <section id="resultsArea" class="card hidden">
        <h2>Activity Complete</h2>
        <p id="resultsSummary"></p>
    </section>

</div>

<footer class="footer">
    StudyBuddy 3000 Prototype v0.1<br>
    © SciSims3000
</footer>

<script src="script.js"></script>

</body>
</html>
